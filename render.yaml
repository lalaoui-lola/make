services:
  - type: web
    name: recipe-scraper
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m gunicorn app:app --bind 0.0.0.0:$PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
